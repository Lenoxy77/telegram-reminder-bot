name: Telegram Reminder Bot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-reminders:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Create .env file from GitHub Secrets
        shell: bash
        run: |
          echo "BOT_TOKEN=${{ secrets.BOT_TOKEN }}" > .env
          echo "CHAT_ID=${{ secrets.CHAT_ID }}" >> .env

      - name: Run reminder check
        run: python check_reminders.py

      - name: Commit updated sent_reminders.txt
        shell: bash
        run: |
          if git diff --quiet sent_reminders.txt; then
            echo "No changes to sent_reminders.txt"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add sent_reminders.txt
            git commit -m "Mark reminders as sent"
            git push
          fi